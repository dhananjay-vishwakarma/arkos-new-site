<section class="hero-slider" aria-label="Featured ARKOS banners">
  <h1 class="sr-only">ARKOS featured banners</h1>

  <div class="hero-swiper" tabindex="0" aria-roledescription="carousel">
    <div class="hero-slider__track">
      <article class="hero-slide is-active">
        <picture>
          <source srcset="assets/hero-banners/pp-final.webp?v=hero-speed-20260618-1" type="image/webp" />
          <img src="assets/hero-banners/pp-final.png?v=hero-speed-20260618-1" width="1996" height="788" alt="ARKOS product banner" fetchpriority="high" decoding="async" />
        </picture>
      </article>

      <article class="hero-slide hero-slide--lightning">
        <picture>
          <source srcset="assets/hero-banners/bolt.webp?v=hero-speed-20260618-2" type="image/webp" />
          <img src="assets/hero-banners/bolt.png?v=hero-speed-20260618-2" width="1996" height="788" alt="ARKOS Bolt product banner" loading="lazy" decoding="async" fetchpriority="low" />
        </picture>
        <span class="lightning-strike lightning-strike--one" aria-hidden="true"></span>
        <span class="lightning-strike lightning-strike--two" aria-hidden="true"></span>
      </article>

      <article class="hero-slide">
        <picture>
          <source srcset="assets/hero-banners/drivz.webp?v=hero-speed-20260618-1" type="image/webp" />
          <img src="assets/hero-banners/drivz.png?v=hero-speed-20260618-1" width="1995" height="788" alt="ARKOS Drivz product banner" loading="lazy" decoding="async" fetchpriority="low" />
        </picture>
      </article>

      <article class="hero-slide">
        <picture>
          <source srcset="assets/hero-banners/vetek.webp?v=hero-speed-20260618-1" type="image/webp" />
          <img src="assets/hero-banners/vetek.png?v=hero-speed-20260618-1" width="1996" height="788" alt="ARKOS VETEK product banner" loading="lazy" decoding="async" fetchpriority="low" />
        </picture>
      </article>
    </div>

    <div class="hero-slider__controls" aria-label="Banner slider controls">
      <button class="hero-slider__button hero-slider__button--prev" type="button" aria-label="Previous banner">
        <i class="fa-solid fa-chevron-left" aria-hidden="true"></i>
      </button>

      <div class="hero-slider__pagination"></div>

      <button class="hero-slider__button hero-slider__button--next" type="button" aria-label="Next banner">
        <i class="fa-solid fa-chevron-right" aria-hidden="true"></i>
      </button>

      <button class="hero-slider__button hero-slider__button--toggle" type="button" aria-label="Pause banner slider" aria-pressed="false">
        <i class="fa-solid fa-pause" aria-hidden="true"></i>
      </button>
    </div>

    <div class="hero-slider__progress" aria-hidden="true">
      <span></span>
    </div>
  </div>
</section>
